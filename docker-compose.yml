services:
  postgres:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=todo-db
    volumes:
      - local_todo_pgdata:/var/lib/postgresql/data

    networks:
      - db_network

volumes:
  local_todo_pgdata:

networks:
  db_network:

